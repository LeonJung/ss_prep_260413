# rtde_dummy.yaml — Config for RTDE + ur_server_dummy testing.
# Server simulates UR firmware (gravity auto-compensated, no friction comp needed).

# --- Firmware compensation switches ---
friction_comp: true          # Server handles friction (like UR firmware)
gravity_comp_internal: true  # Server handles gravity (like UR firmware)

# --- Torque safety limits [Nm] (full range for dummy server) ---
torque_limit: [330.0, 330.0, 150.0, 56.0, 56.0, 56.0]

